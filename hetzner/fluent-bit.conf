[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info

    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    Health_Check On

    storage.path              /buffers
    storage.sync              normal
    storage.checksum          off
    storage.backlog.mem_limit 64M

[PARSER]
    Name        app_json
    Format      json
    Time_Key    timestamp
    Time_Keep   On

[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224
    storage.type  filesystem

[FILTER]
    Name          parser
    Match         *
    Key_Name      log
    Parser        app_json
    Reserve_Data  On
    Preserve_Key  On

[FILTER]
    Name  modify
    Match *
    Add   app tracking-so
    Add   environment production

[OUTPUT]
    Name        http
    Match       *
    TLS         On
    Host        ${BETTERSTACK_INGESTING_HOST}
    Port        443
    URI         /fluentbit
    Header      Authorization Bearer ${BETTERSTACK_SOURCE_TOKEN}
    Header      Content-Type application/msgpack
    Format      msgpack
    Retry_Limit False
    net.dns.mode TCP
