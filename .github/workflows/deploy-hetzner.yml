name: deploy hetzner

on:
  push:
    branches: [main]
    paths:
      - "apps/backend-node/**"
      - "packages/**"
      - "hetzner/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-hetzner.yml"
  workflow_dispatch:

concurrency:
  group: deploy-hetzner
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/tracking-so-backend
  REMOTE_DIR: /root/tracking-so-hetzner

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend-node/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: prune old backend images
        run: |
          ssh root@${{ secrets.HETZNER_HOST }} bash <<'EOF'
          set -euo pipefail
          backend_repo="ghcr.io/${{ github.repository_owner }}/tracking-so-backend"

          docker image prune -f

          mapfile -t keep_backend_images < <(
            docker image ls "$backend_repo" \
              --no-trunc \
              --format '{{.ID}}' \
              | awk '!seen[$0]++ && kept++ < 5'
          )

          mapfile -t running_images < <(
            docker ps --format '{{.Image}}' \
              | xargs -r docker image inspect --format '{{.Id}}' 2>/dev/null \
              | sort -u
          )

          is_kept_image() {
            local image_id="$1"
            local kept
            for kept in "${keep_backend_images[@]}" "${running_images[@]}"; do
              if [ "$image_id" = "$kept" ]; then
                return 0
              fi
            done
            return 1
          }

          old_backend_images=()
          while IFS= read -r image_id; do
            if ! is_kept_image "$image_id"; then
              old_backend_images+=("$image_id")
            fi
          done < <(
            docker image ls "$backend_repo" \
              --no-trunc \
              --format '{{.ID}}' \
              | sort -u
          )

          if [ "${#old_backend_images[@]}" -gt 0 ]; then
            docker image rm -f "${old_backend_images[@]}" || true
          fi
          EOF

      - name: sync compose + caddy
        run: |
          ssh root@${{ secrets.HETZNER_HOST }} "mkdir -p ${{ env.REMOTE_DIR }}"
          rsync -az hetzner/docker-compose.yml hetzner/Caddyfile hetzner/fluent-bit.conf \
            root@${{ secrets.HETZNER_HOST }}:${{ env.REMOTE_DIR }}/

      - name: write env file
        run: |
          ssh root@${{ secrets.HETZNER_HOST }} "umask 077 && cat > ${{ env.REMOTE_DIR }}/.env" <<'ENV'
          ${{ secrets.HETZNER_ENV_FILE }}
          ENV

      - name: deploy
        run: |
          ssh root@${{ secrets.HETZNER_HOST }} bash -s -- \
            '${{ secrets.GITHUB_TOKEN }}' \
            '${{ github.actor }}' \
            '${{ env.REMOTE_DIR }}' \
            '${{ env.IMAGE }}:${{ steps.tag.outputs.sha }}' <<'EOF'
          set -euo pipefail
          github_token="$1"
          github_actor="$2"
          remote_dir="$3"
          backend_image="$4"

          echo "$github_token" | docker login ghcr.io -u "$github_actor" --password-stdin
          cd "$remote_dir"
          export BACKEND_IMAGE="$backend_image"
          docker compose up -d redis < /dev/null
          for i in {1..20}; do
            if docker compose exec -T redis redis-cli ping < /dev/null | grep -q PONG; then
              echo "redis is ready"
              break
            fi
            if [ "$i" = "20" ]; then
              echo "redis failed to become ready" >&2
              docker compose ps < /dev/null
              exit 1
            fi
            sleep 1
          done
          docker compose pull backend < /dev/null
          docker compose up -d --force-recreate backend < /dev/null
          running_image="$(docker inspect tsw-backend --format '{{.Config.Image}}')"
          if [ "$running_image" != "$backend_image" ]; then
            echo "backend image mismatch: expected $backend_image, got $running_image" >&2
            docker compose ps < /dev/null
            exit 1
          fi
          docker image prune -f < /dev/null
          docker compose ps < /dev/null
          EOF

      - name: smoke test
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://api.tracking.so/health || true)
            echo "attempt $i: HTTP $code"
            [[ "$code" == "200" ]] && exit 0
            sleep 10
          done
          echo "health check failed" >&2
          exit 1
