services:
  mongo:
    image: mongo
    restart: always
    container_name: tsw-mongo
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: tsw
      MONGO_INITDB_ROOT_PASSWORD: tsw
    volumes:
      - ./db_data/:/data/db/

  redis:
    image: redis:7-alpine
    container_name: tsw-local-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
